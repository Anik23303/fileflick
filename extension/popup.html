<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>FileFlick Converter</title>
  <style>
    /* Reset & Base */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      width: 360px; 
      padding: 16px; 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
      background: #f8fafc; 
      color: #1e293b;
      max-height: 600px;
      overflow-y: auto;
    }
    h2 { 
      font-size: 20px; 
      text-align: center; 
      margin-bottom: 4px; 
      background: linear-gradient(to right, #2563eb, #4f46e5);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle { text-align: center; font-size: 11px; color: #64748b; margin-bottom: 16px; }
    
    /* Drop Zone */
    .drop-zone {
      border: 2px dashed #cbd5e1;
      border-radius: 8px;
      padding: 16px;
      text-align: center;
      background: white;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 12px;
    }
    .drop-zone:hover, .drop-zone.dragover {
      border-color: #3b82f6;
      background: #eff6ff;
      transform: scale(1.02);
    }
    .drop-zone input { display: none; }
    .drop-zone p { font-size: 13px; color: #475569; }
    .drop-zone small { color: #94a3b8; font-size: 11px; }

    /* File Queue */
    .queue-container { max-height: 200px; overflow-y: auto; margin-bottom: 12px; }
    .file-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: white;
      padding: 6px 10px;
      border-radius: 6px;
      border: 1px solid #e2e8f0;
      margin-bottom: 4px;
      font-size: 12px;
    }
    .file-item .info { display: flex; align-items: center; gap: 6px; flex: 1; min-width: 0; }
    .file-item .name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .file-item .badge { 
      font-size: 9px; 
      padding: 2px 6px; 
      border-radius: 12px; 
      background: #e2e8f0; 
      color: #475569;
      white-space: nowrap;
    }
    .file-item .badge.unsupported { background: #fecaca; color: #991b1b; }
    .file-item .remove { cursor: pointer; color: #94a3b8; font-weight: bold; padding: 0 4px; }
    .file-item .remove:hover { color: #ef4444; }

    /* Status Bar */
    .status-text { font-size: 11px; color: #64748b; text-align: center; margin-bottom: 8px; }

    /* Error Banner */
    .error-banner {
      background: #fef2f2;
      border: 1px solid #fca5a5;
      border-radius: 6px;
      padding: 8px 10px;
      margin-bottom: 12px;
      display: none;
    }
    .error-banner.show { display: block; }
    .error-banner p { font-size: 12px; color: #991b1b; }
    .error-banner .title { font-weight: 600; }

    /* Controls */
    .controls { display: flex; gap: 8px; }
    .controls select {
      flex: 2;
      padding: 8px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      background: white;
      font-size: 13px;
    }
    .controls button {
      flex: 3;
      background: #2563eb;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 6px;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .controls button:hover:not(:disabled) { background: #1d4ed8; }
    .controls button:disabled { background: #94a3b8; cursor: not-allowed; }

    /* Progress Bar (mini) */
    .progress-wrap { margin-top: 8px; display: none; }
    .progress-wrap.show { display: block; }
    .progress-bar {
      width: 100%;
      height: 4px;
      background: #e2e8f0;
      border-radius: 4px;
      overflow: hidden;
      margin-top: 4px;
    }
    .progress-fill {
      height: 100%;
      background: #2563eb;
      width: 0%;
      transition: width 0.3s;
    }
    .progress-text { font-size: 10px; color: #475569; display: flex; justify-content: space-between; }

    .footer { font-size: 9px; text-align: center; color: #94a3b8; margin-top: 12px; border-top: 1px solid #e2e8f0; padding-top: 8px; }
  </style>
</head>
<body>

  <h2>⚡ FileFlick</h2>
  <div class="subtitle">Instant · Private · Free</div>

  <!-- Drop Zone -->
  <div class="drop-zone" id="dropZone">
    <p>📁 Drop files here</p>
    <small>or click to browse (Images, PDF, DOCX)</small>
    <input type="file" id="fileInput" multiple accept="image/*,.pdf,.docx">
  </div>

  <!-- File Queue -->
  <div id="statusText" class="status-text">No files uploaded.</div>
  <div id="errorBanner" class="error-banner">
    <p><span class="title">⚠️ Conversion Blocked</span><br><span id="errorMessage">Mixed types detected.</span></p>
  </div>
  <div id="queueContainer" class="queue-container"></div>

  <!-- Controls -->
  <div class="controls">
    <select id="formatSelect" disabled>
      <option value="png">PNG</option>
    </select>
    <button id="convertBtn" disabled>Convert</button>
  </div>

  <!-- Progress -->
  <div id="progressWrap" class="progress-wrap">
    <div class="progress-text"><span id="progressMsg">Converting...</span><span id="progressPercent">0%</span></div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>

  <div class="footer">🔒 100% local · No uploads</div>

  <script type="module" src="popup.js"></script>
</body>
</html>
